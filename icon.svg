<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0F0E0C"/>
  <rect width="512" height="512" rx="112" fill="url(#grad)"/>
  <defs>
    <radialGradient id="grad" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#1a1610"/>
      <stop offset="100%" stop-color="#0F0E0C"/>
    </radialGradient>
  </defs>
  <!-- Decorative arc lines -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(201,168,76,0.12)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
  <!-- Globe emoji rendered as text -->
  <text x="256" y="330" text-anchor="middle" font-size="220" font-family="Apple Color Emoji,Segoe UI Emoji,Noto Color Emoji,sans-serif">🌏</text>
  <!-- Gold accent dot -->
  <circle cx="256" cy="420" r="10" fill="#C9A84C" opacity="0.6"/>
</svg>
